的一种动态网页开发技术。", "analysis": "Java 服务器页面（Java Server Pages），建立在 Servlet 基础上的一种动态网页开发技术。"}, {"id": "term-2", "section": "名词解释", "type": "text", "number": 2, "question": "Servlet", "options": [], "answer": "Java Web 开发中的一种服务器端 Java 程序，用于处理客户端请求并生成动态响应，具有生命周期方法（init、service、destroy）。", "analysis": "Java Web 开发中的一种服务器端 Java 程序，用于处理客户端请求并生成动态响应，具有生命周期方法（init、service、destroy）。"}, {"id": "term-3", "section": "名词解释", "type": "text", "number": 3, "question": "Tomcat", "options": [], "answer": "Apache 组织开发的开放源代码的 Servlet 和 JSP 容器，具有 Web 服务器基本功能。", "analysis": "Apache 组织开发的开放源代码的 Servlet 和 JSP 容器，具有 Web 服务器基本功能。"}, {"id": "term-4", "section": "名词解释", "type": "text", "number": 4, "question": "JDK", "options": [], "answer": "Java 开发工具包（Java Development Kit），由 Sun 公司提供，为 Java 程序开发提供编译和运行环境。", "analysis": "Java 开发工具包（Java Development Kit），由 Sun 公司提供，为 Java 程序开发提供编译和运行环境。"}, {"id": "term-5", "section": "名词解释", "type": "text", "number": 5, "question": "B/S 结构", "options": [], "answer": "浏览器/服务器结构（Brower/Server），客户端通过浏览器访问服务器，是 Web 应用常见架构。", "analysis": "浏览器/服务器结构（Brower/Server），客户端通过浏览器访问服务器，是 Web 应用常见架构。"}, {"id": "term-6", "section": "名词解释", "type": "text", "number": 6, "question": "EL 表达式", "options": [], "answer": "Expression Language 的缩写，是 JSP2.0 规范中提供的一种简单数据访问语言，语法为${表达式}，用于获取作用域中的属性数据。", "analysis": "Expression Language 的缩写，是 JSP2.0 规范中提供的一种简单数据访问语言，语法为${表达式}，用于获取作用域中的属性数据。"}, {"id": "term-7", "section": "名词解释", "type": "text", "number": 7, "question": "JSTL", "options": [], "answer": "JSP 标准标签库（JavaServer Pages Standard Tag Library），提供一组通用标签，简化 JSP 页面开发，增强代码重用性。", "analysis": "JSP 标准标签库（JavaServer Pages Standard Tag Library），提供一组通用标签，简化 JSP 页面开发，增强代码重用性。"}, {"id": "term-8", "section": "名词解释", "type": "text", "number": 8, "question": "JDBC", "options": [], "answer": "Java 数据库连接（Java Database Connectivity），Java 访问数据库的标准规范，位于java.sql 包中，为多种关系型数据库提供统一访问接口。", "analysis": "Java 数据库连接（Java Database Connectivity），Java 访问数据库的标准规范，位于java.sql 包中，为多种关系型数据库提供统一访问接口。"}, {"id": "term-9", "section": "名词解释", "type": "text", "number": 9, "question": "Session", "options": [], "answer": "将会话数据存储在服务器端的技术，为每个用户浏览器创建一个独享的 Session 对象，用于保存用户相关数据。", "analysis": "将会话数据存储在服务器端的技术，为每个用户浏览器创建一个独享的 Session 对象，用于保存用户相关数据。"}, {"id": "short-1", "section": "简答题", "type": "text", "number": 1, "question": "比较C/S架构与B/S架构的优劣。", "options": [], "answer": "> C/S架构（客户端/服务器）：\n- 优点：客户端可处理复杂逻辑，响应速度快，用户体验好，支持离线操作\n- 缺点：需要安装客户端软件，部署和维护成本高，跨平台兼容性差，升级困难\n\nB/S架构（浏览器/服务器）：\n- 优点：无需安装客户端，维护方便，跨平台性好，只需浏览器即可访问\n- 缺点：受浏览器限制，复杂交互体验较差，对网络依赖性强，安全性相对较低", "analysis": "> C/S架构（客户端/服务器）：\n- 优点：客户端可处理复杂逻辑，响应速度快，用户体验好，支持离线操作\n- 缺点：需要安装客户端软件，部署和维护成本高，跨平台兼容性差，升级困难\n\nB/S架构（浏览器/服务器）：\n- 优点：无需安装客户端，维护方便，跨平台性好，只需浏览器即可访问\n- 缺点：受浏览器限制，复杂交互体验较差，对网络依赖性强，安全性相对较低"}, {"id": "short-2", "section": "简答题", "type": "text", "number": 2, "question": "比较以GET方式与POST方式提交请求的优劣。", "options": [], "answer": "> GET方式：\n- 优点：参数在URL中可见，可被缓存、收藏，支持书签，传输速度快\n- 缺点：参数长度有限制（约2KB），安全性差（参数暴露在URL中），不适合传输敏感数据\n\nPOST方式：\n- 优点：参数在请求体中，无长度限制，安全性较高，适合传输大量数据和敏感信息\n- 缺点：不能被缓存和收藏，不支持书签，每次都需要重新发送请求", "analysis": "> GET方式：\n- 优点：参数在URL中可见，可被缓存、收藏，支持书签，传输速度快\n- 缺点：参数长度有限制（约2KB），安全性差（参数暴露在URL中），不适合传输敏感数据\n\nPOST方式：\n- 优点：参数在请求体中，无长度限制，安全性较高，适合传输大量数据和敏感信息\n- 缺点：不能被缓存和收藏，不支持书签，每次都需要重新发送请求"}, {"id": "short-3", "section": "简答题", "type": "text", "number": 3, "question": "比较以Cookie和Session技术进行会话跟踪的优劣。", "options": [], "answer": "> Cookie技术：\n- 优点：数据存储在客户端，减轻服务器压力，可设置较长的过期时间，支持跨请求持久化\n- 缺点：安全性较低（客户端可查看和篡改），数据大小有限制（约4KB），只能存储字符串\n\nSession技术：\n- 优点：数据存储在服务器端，安全性高，可存储任意类型数据，无大小限制\n- 缺点：占用服务器内存资源，用户量大时影响服务器性能，依赖Cookie或URL重写传递SessionID", "analysis": "> Cookie技术：\n- 优点：数据存储在客户端，减轻服务器压力，可设置较长的过期时间，支持跨请求持久化\n- 缺点：安全性较低（客户端可查看和篡改），数据大小有限制（约4KB），只能存储字符串\n\nSession技术：\n- 优点：数据存储在服务器端，安全性高，可存储任意类型数据，无大小限制\n- 缺点：占用服务器内存资源，用户量大时影响服务器性能，依赖Cookie或URL重写传递SessionID"}, {"id": "short-4", "section": "简答题", "type": "text", "number": 4, "question": "比较以Statement接口和PreparedStatement接口执行SQL语句的优劣。", "options": [], "answer": "> Statement接口：\n- 优点：使用简单，适合执行一次性SQL语句\n- 缺点：每次执行都需要编译SQL，效率较低；存在SQL注入风险（字符串拼接）\n\nPreparedStatement接口：\n- 优点：预编译SQL，多次执行效率高；使用参数化查询，有效防止SQL注入攻击\n- 缺点：使用相对复杂，需要设置参数占位符", "analysis": "> Statement接口：\n- 优点：使用简单，适合执行一次性SQL语句\n- 缺点：每次执行都需要编译SQL，效率较低；存在SQL注入风险（字符串拼接）\n\nPreparedStatement接口：\n- 优点：预编译SQL，多次执行效率高；使用参数化查询，有效防止SQL注入攻击\n- 缺点：使用相对复杂，需要设置参数占位符"}, {"id": "short-5", "section": "简答题", "type": "text", "number": 5, "question": "比较以JSP内置标签和JSTL+EL方式开发Web项目的优劣。", "options": [], "answer": "> JSP内置标签（如jsp:include、jsp:forward）：\n- 优点：JSP规范内置，无需额外引入库\n- 缺点：功能有限，不能实现复杂逻辑（如循环、条件判断），页面中仍需嵌入Java代码\n\nJSTL + EL方式：\n- 优点：标签功能丰富（条件、循环、格式化等），EL简化数据访问，真正实现业务代码分离，提高可维护性\n- 缺点：需要引入JSTL依赖库，学习成本稍高\n\n---\n\n## 五、编程题", "analysis": "> JSP内置标签（如jsp:include、jsp:forward）：\n- 优点：JSP规范内置，无需额外引入库\n- 缺点：功能有限，不能实现复杂逻辑（如循环、条件判断），页面中仍需嵌入Java代码\n\nJSTL + EL方式：\n- 优点：标签功能丰富（条件、循环、格式化等），EL简化数据访问，真正实现业务代码分离，提高可维护性\n- 缺点：需要引入JSTL依赖库，学习成本稍高\n\n---\n\n## 五、编程题"}, {"id": "program-1", "section": "编程题", "type": "text", "number": 1, "question": "前端表单与Servlet补全\n\n题干：\n\n现有如下前端表单页面代码：\n\n```html\n\n    用户名: \n    密码: \n    性别: 男女\n    邮箱: \n    你最喜欢的颜色: \n    语言:\n        Java\n        PHP\n        Python\n    专业: \n            23网络工程技术\n            23软件工程技术\n            23大数据工程技术\n            23物联网工程技术\n          \n    备注: \n    \n\n用户管理\n```\n\n请根据前端代码，填写Servlet中需要补全的位置：\n\n需补全的代码（10处）：\n\n```java\n@WebServlet(\"__________①__________\")\npublic class RegServlet extends HttpServlet {\n    private static final long serialVersionUID = 1L;\n    protected void doPost(HttpServletRequest request, HttpServletResponse response)\n            throws ServletException, IOException {\n        request.setCharacterEncoding(\"__________②__________\");// 处理中文乱码\n        String username = request.getParameter(\"__________③__________\");\n        String password = request.getParameter(\"__________④__________\");\n        String sex = request.getParameter(\"__________⑤__________\");\n        String email = request.getParameter(\"__________⑥__________\");\n        String color = request.getParameter(\"__________⑦__________\");\n        String myclass = request.getParameter(\"__________⑧__________\");\n        String memo = request.getParameter(\"__________⑨__________\");\n        String[] pl = request.getParameterValues(\"__________⑩__________\");\n        String pls = \"\";\n        if (pl != null) {\n            for(String lan : pl) {\n                pls += (lan + \";\");\n            }\n        }\n        // ... 后续代码省略\n    }\n}\n```", "options": [], "answer": "| 编号 | 填写内容 | 说明 |\n|------|----------|------|\n| ① | `/RegServlet` | Servlet映射路径，需与表单action对应 |\n| ② | `utf-8` | 设置请求编码，解决中文乱码 |\n| ③ | `username` | 对应表单 `name=\"username\"` |\n| ④ | `password` | 对应表单 `name=\"password\"` |\n| ⑤ | `sex` | 对应表单 `name=\"sex\"` |\n| ⑥ | `email` | 对应表单 `name=\"email\"` |\n| ⑦ | `color` | 对应表单 `name=\"color\"` |\n| ⑧ | `class` | 对应表单 `name=\"class\"` |\n| ⑨ | `memo` | 对应表单 `name=\"memo\"` |\n| ⑩ | `language` | 对应多选框 `name=\"language\"` |", "analysis": "| 编号 | 填写内容 | 说明 |\n|------|----------|------|\n| ① | `/RegServlet` | Servlet映射路径，需与表单action对应 |\n| ② | `utf-8` | 设置请求编码，解决中文乱码 |\n| ③ | `username` | 对应表单 `name=\"username\"` |\n| ④ | `password` | 对应表单 `name=\"password\"` |\n| ⑤ | `sex` | 对应表单 `name=\"sex\"` |\n| ⑥ | `email` | 对应表单 `name=\"email\"` |\n| ⑦ | `color` | 对应表单 `name=\"color\"` |\n| ⑧ | `class` | 对应表单 `name=\"class\"` |\n| ⑨ | `memo` | 对应表单 `name=\"memo\"` |\n| ⑩ | `language` | 对应多选框 `name=\"language\"` |"}, {"id": "program-2", "section": "编程题", "type": "text", "number": 2, "question": "数据库连接工具类补全\n\n题干：\n\n补全以下项目代码（数据库操作公共类）：\n\n```java\n/\n * 数据库操作公共类\n */\npublic class DatabaseService {\n    private final String DRIVER = \"com.mysql.jdbc.Driver\";       // 驱动字符串\n    private final String URL = \"jdbc:mysql://127.0.0.1:3306/hbcit?useUnicode=true&characterEncoding=utf-8\";  // 数据库URL\n    private final String DB_USERNAME = \"root\";                     // 数据库用户名\n    private final String DB_PASSWORD = \"123456\";                    // 数据库密码\n    Connection conn;\n\n    public Connection getConnection() {\n        try {\n            // 第一步：加载驱动\n            Class.forName(__________①__________);\n\n            // 第二步：创建数据库连接\n            conn = DriverManager.getConnection(__________②__________, __________③__________, __________④__________);\n\n        } catch (ClassNotFoundException e) {\n            e.printStackTrace();\n        } catch (SQLException e) {\n            e.printStackTrace();\n        }\n        return conn;\n    }\n}\n```", "options": [], "answer": "| 编号 | 填写内容 | 说明 |\n|------|----------|------|\n| ① | `DRIVER` 或 `\"com.mysql.jdbc.Driver\"` | 数据库驱动类名 |\n| ② | `URL` 或完整的JDBC URL字符串 | 数据库连接地址 |\n| ③ | `DB_USERNAME` 或 `\"root\"` | 数据库用户名 |\n| ④ | `DB_PASSWORD` 或 `\"123456\"` | 数据库密码 |", "analysis": "| 编号 | 填写内容 | 说明 |\n|------|----------|------|\n| ① | `DRIVER` 或 `\"com.mysql.jdbc.Driver\"` | 数据库驱动类名 |\n| ② | `URL` 或完整的JDBC URL字符串 | 数据库连接地址 |\n| ③ | `DB_USERNAME` 或 `\"root\"` | 数据库用户名 |\n| ④ | `DB_PASSWORD` 或 `\"123456\"` | 数据库密码 |"}];
const state = { answers: {}, submitted: false, wrongOnly: false, selfMarks: {} };
const sections = ['全部', ...Array.from(new Set(QUESTIONS.map(q => q.section)))];
const $ = id => document.getElementById(id);
const escapeHtml = value => String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
function isAnswered(q) {
  if (q.type === 'text') return Boolean((state.answers[q.id] || '').trim()) || state.selfMarks[q.id];
  return Boolean(state.answers[q.id]);
}
function isCorrect(q) {
  if (q.type === 'text') return state.selfMarks[q.id] === 'correct';
  return state.answers[q.id] === q.answer;
}
function isWrong(q) {
  if (q.type === 'text') return state.selfMarks[q.id] === 'wrong';
  return state.submitted && Boolean(state.answers[q.id]) && state.answers[q.id] !== q.answer;
}
function renderFilters() {
  const currentSection = $('sectionFilter').value || '全部';
  $('sectionFilter').innerHTML = sections.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');
  $('sectionFilter').value = sections.includes(currentSection) ? currentSection : '全部';
  $('sectionTabs').innerHTML = sections.map(s => `<button data-section="${escapeHtml(s)}" class="${s === $('sectionFilter').value ? 'active' : ''}">${escapeHtml(s)}（${s==='全部'?QUESTIONS.length:QUESTIONS.filter(q=>q.section===s).length}）</button>`).join('');
  document.querySelectorAll('#sectionTabs button').forEach(btn => btn.onclick = () => {
    $('sectionFilter').value = btn.dataset.section;
    render();
    $('questionList').scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
}
function renderQuestion(q) {
  const statusClass = state.submitted || q.type === 'text' ? (isCorrect(q) ? 'correct' : isWrong(q) ? 'wrong' : '') : '';
  const answer = state.answers[q.id] || '';
  const resultVisible = state.submitted ? 'show' : '';
  const objectiveResult = q.type !== 'text' && state.submitted ? `<div class="result ${resultVisible}"><div class="${isCorrect(q) ? 'ok' : 'bad'}">${isCorrect(q) ? '回答正确' : answer ? '回答错误' : '未作答'}</div><div>你的答案：${escapeHtml(answer || '未作答')}；正确答案：${escapeHtml(q.answer)}</div><div class="analysis">解析：${escapeHtml(q.analysis)}</div></div>` : '';
  const textResult = q.type === 'text' && state.submitted ? `<div class="result show"><div><b>参考答案：</b></div><div class="analysis">${escapeHtml(q.answer)}</div><div class="self-check"><button data-self="correct" data-id="${q.id}">我答对了</button><button data-self="wrong" data-id="${q.id}">我答错了</button><span class="badge">${state.selfMarks[q.id] === 'correct' ? '已标记正确' : state.selfMarks[q.id] === 'wrong' ? '已加入错题' : '待自评'}</span></div></div>` : '';
  const body = q.type === 'text'
    ? `<textarea data-text="${q.id}" placeholder="在这里输入你的答案，提交后对照参考答案自评。">${escapeHtml(answer)}</textarea>`
    : `<div class="options">${q.options.map(opt => `<label class="option"><input type="radio" name="${q.id}" value="${escapeHtml(opt.key)}" ${answer===opt.key?'checked':''}> <b>${escapeHtml(opt.key)}.</b> <span>${escapeHtml(opt.text)}</span></label>`).join('')}</div>`;
  return `<article class="question-card ${statusClass}" data-id="${q.id}"><div class="q-head"><div class="badge">${escapeHtml(q.section)} · 第 ${q.number} 题</div><div class="badge">${q.type === 'text' ? '主观题' : '自动判分'}</div></div><div class="q-title">${escapeHtml(q.question)}</div>${body}${objectiveResult}${textResult}</article>`;
}
function filteredQuestions() {
  const section = $('sectionFilter').value || '全部';
  return QUESTIONS.filter(q => (section === '全部' || q.section === section) && (!state.wrongOnly || isWrong(q)));
}
function render() {
  renderFilters();
  const list = filteredQuestions();
  $('questionList').innerHTML = list.length ? list.map(renderQuestion).join('') : '<div class="empty">当前筛选条件下没有题目。</div>';
  bindInputs();
  updateStats();
}
function bindInputs() {
  document.querySelectorAll('input[type="radio"]').forEach(input => input.onchange = e => { state.answers[e.target.name] = e.target.value; updateStats(); });
  document.querySelectorAll('textarea[data-text]').forEach(input => input.oninput = e => { state.answers[e.target.dataset.text] = e.target.value; updateStats(); });
  document.querySelectorAll('button[data-self]').forEach(btn => btn.onclick = () => { state.selfMarks[btn.dataset.id] = btn.dataset.self; render(); });
}
function updateStats() {
  $('totalCount').textContent = QUESTIONS.length;
  $('answeredCount').textContent = QUESTIONS.filter(isAnswered).length;
  $('correctCount').textContent = QUESTIONS.filter(q => state.submitted && isCorrect(q)).length;
  $('wrongCount').textContent = QUESTIONS.filter(isWrong).length;
}
function exportWrong() {
  const wrong = QUESTIONS.filter(isWrong);
  if (!wrong.length) { alert('当前没有错题可导出。'); return; }
  const nl = String.fromCharCode(10);
  const br = '<br>';
  const rows = wrong.map(q => `<section><h2>${escapeHtml(q.section)} 第 ${q.number} 题</h2><p>${escapeHtml(q.question).split(nl).join(br)}</p><p><b>你的答案：</b>${escapeHtml(state.answers[q.id] || '未作答').split(nl).join(br)}</p><p><b>正确答案/参考答案：</b>${escapeHtml(q.answer).split(nl).join(br)}</p><p><b>解析：</b>${escapeHtml(q.analysis || q.answer).split(nl).join(br)}</p></section>`).join(nl);
  const doc = `<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><title>JavaWeb错题导出</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;line-height:1.7;max-width:920px;margin:30px auto;padding:0 18px}section{border:1px solid #ddd;border-radius:12px;padding:16px;margin:14px 0}h1{color:#1d4ed8}</style></head><body><h1>JavaWeb 错题导出</h1><p>共 ${wrong.length} 道错题，导出时间：${new Date().toLocaleString()}</p>${rows}</body></html>`;
  const blob = new Blob([doc], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'JavaWeb错题导出.html';
  a.click();
  URL.revokeObjectURL(a.href);
}
$('submitBtn').onclick = () => { state.submitted = true; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
$('wrongOnlyBtn').onclick = () => { state.wrongOnly = !state.wrongOnly; $('wrongOnlyBtn').textContent = state.wrongOnly ? '查看全部' : '只看错题'; render(); };
$('exportBtn').onclick = exportWrong;
$('resetBtn').onclick = () => { if (!confirm('确定要清空所有作答记录吗？')) return; state.answers = {}; state.submitted = false; state.wrongOnly = false; state.selfMarks = {}; $('wrongOnlyBtn').textContent = '只看错题'; render(); };
$('sectionFilter').onchange = render;
render();

const themeToggleBtn = $('themeToggleBtn');
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('quiz-theme', theme);
}
const savedTheme = localStorage.getItem('quiz-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
setTheme(savedTheme);
themeToggleBtn.onclick = () => {
  const currentTheme = document.documentElement.getAttribute('data-theme');
  setTheme(currentTheme === 'dark' ? 'light' : 'dark');
};

// ================= 沉浸式刷题逻辑 =================
let isImmersive = false;
let immIndex = 0;
let immQuestions = [];
let immSubmittedIds = new Set(); 

// Check if multi type
function _isMType(q) {
  return q.type === 'multiple' || q.type === 'multi';
}

const enterBtn = document.createElement('button');
enterBtn.textContent = '沉浸模式';
enterBtn.style.fontWeight = 'bold';
enterBtn.style.color = 'var(--primary)';
enterBtn.style.borderColor = 'var(--primary)';
enterBtn.onclick = () => {
  isImmersive = true;
  document.body.classList.add('immersive-mode');
  immQuestions = filteredQuestions();
  immIndex = 0;
  renderImmersive();
};
document.querySelector('.toolbar').insertBefore(enterBtn, document.querySelector('.toolbar').firstChild);

$('immExitBtn').onclick = () => {
  isImmersive = false;
  document.body.classList.remove('immersive-mode');
  render();
};

$('immSubmitAllBtn').onclick = () => {
  if(confirm('确认全部提交（交卷）吗？')) {
    state.submitted = true;
    renderImmersive();
    updateStats();
  }
};

$('immCloseSidebarBtn').onclick = () => {
  $('immersiveSidebar').classList.add('collapsed');
  $('immOpenSidebarBtn').classList.remove('hidden');
};
$('immOpenSidebarBtn').onclick = () => {
  $('immersiveSidebar').classList.remove('collapsed');
  $('immOpenSidebarBtn').classList.add('hidden');
};

function renderImmersiveGrid() {
  const originalSub = state.submitted;
  $('immersiveGrid').innerHTML = immQuestions.map((q, i) => {
    state.submitted = originalSub || immSubmittedIds.has(q.id);
    let cls = '';
    if (state.submitted || q.type === 'text') {
      if (isCorrect(q)) cls = 'correct';
      else if (isWrong(q)) cls = 'wrong';
      else if (isAnswered(q)) cls = 'answered';
    } else {
      if (isAnswered(q)) cls = 'answered';
    }
    if (i === immIndex) cls += ' active';
    return `<button class="${cls}" data-imm-idx="${i}">${i + 1}</button>`;
  }).join('');
  state.submitted = originalSub;

  document.querySelectorAll('#immersiveGrid button').forEach(btn => {
    btn.onclick = () => { immIndex = parseInt(btn.dataset.immIdx); renderImmersive(); };
  });
  
  const activeBtn = document.querySelector('#immersiveGrid button.active');
  if (activeBtn) activeBtn.scrollIntoView({ block: 'nearest' });
}

function renderImmersive() {
  if (!immQuestions.length) {
    $('immersiveQuestionArea').innerHTML = '<div class="empty">当前没有题目可刷</div>';
    return;
  }
  if (immIndex >= immQuestions.length) immIndex = immQuestions.length - 1;
  if (immIndex < 0) immIndex = 0;
  
  const q = immQuestions[immIndex];
  
  const originalSub = state.submitted;
  state.submitted = originalSub || immSubmittedIds.has(q.id);
  
  let qHtml = '';
  if (_isMType(q)) {
    const statusClass = state.submitted ? (isCorrect(q) ? 'correct' : isWrong(q) ? 'wrong' : '') : '';
    const answer = state.answers[q.id] || [];
    const ansArray = Array.isArray(answer) ? answer : [answer].filter(Boolean);
    const resultVisible = state.submitted ? 'show' : '';
    const objectiveResult = state.submitted ? `<div class="result ${resultVisible}"><div class="${isCorrect(q) ? 'ok' : 'bad'}">${isCorrect(q) ? '回答正确' : ansArray.length ? '回答错误' : '未作答'}</div><div>你的答案：${escapeHtml(ansArray.join(',') || '未作答')}；正确答案：${escapeHtml(q.answer)}</div><div class="analysis">解析：${escapeHtml(q.analysis)}</div></div>` : '';
    
    const body = `<div class="options">${q.options.map(opt => `<label class="option"><input type="checkbox" name="${q.id}" value="${escapeHtml(opt.key)}" ${ansArray.includes(opt.key)?'checked':''}> <b>${escapeHtml(opt.key)}.</b> <span>${escapeHtml(opt.text)}</span></label>`).join('')}</div>`;
    
    qHtml = `<article class="question-card ${statusClass}" data-id="${q.id}"><div class="q-head"><div class="badge">${escapeHtml(q.section)} · 第 ${q.number} 题</div><div class="badge">多选题</div></div><div class="q-title">${escapeHtml(q.question)}</div>${body}${objectiveResult}</article>`;
  } else {
    qHtml = renderQuestion(q);
  }
  
  state.submitted = originalSub;
  
  $('immersiveQuestionArea').innerHTML = qHtml;
  
  document.querySelectorAll('#immersiveQuestionArea input[type="radio"]').forEach(input => input.onchange = e => { state.answers[e.target.name] = e.target.value; renderImmersiveGrid(); updateStats(); });
  document.querySelectorAll('#immersiveQuestionArea input[type="checkbox"]').forEach(input => input.onchange = e => { 
    const qid = e.target.name;
    let arr = state.answers[qid] || [];
    if (!Array.isArray(arr)) arr = [arr].filter(Boolean);
    if (e.target.checked) { if (!arr.includes(e.target.value)) arr.push(e.target.value); }
    else { arr = arr.filter(v => v !== e.target.value); }
    arr.sort();
    state.answers[qid] = arr;
    renderImmersiveGrid(); updateStats();
  });
  document.querySelectorAll('#immersiveQuestionArea textarea[data-text]').forEach(input => input.oninput = e => { state.answers[e.target.dataset.text] = e.target.value; renderImmersiveGrid(); updateStats(); });
  document.querySelectorAll('#immersiveQuestionArea button[data-self]').forEach(btn => btn.onclick = () => { state.selfMarks[btn.dataset.id] = btn.dataset.self; renderImmersive(); updateStats(); });
  
  $('immPrevBtn').disabled = immIndex === 0;
  $('immNextBtn').disabled = immIndex === immQuestions.length - 1;
  renderImmersiveGrid();
}

$('immPrevBtn').onclick = () => { if(immIndex > 0) { immIndex--; renderImmersive(); } };
$('immNextBtn').onclick = () => { if(immIndex < immQuestions.length - 1) { immIndex++; renderImmersive(); } };

const originalRenderQuestion = renderQuestion;
renderQuestion = (q) => {
  if (_isMType(q)) {
    const statusClass = state.submitted ? (isCorrect(q) ? 'correct' : isWrong(q) ? 'wrong' : '') : '';
    const answer = state.answers[q.id] || [];
    const ansArray = Array.isArray(answer) ? answer : [answer].filter(Boolean);
    const resultVisible = state.submitted ? 'show' : '';
    const objectiveResult = state.submitted ? `<div class="result ${resultVisible}"><div class="${isCorrect(q) ? 'ok' : 'bad'}">${isCorrect(q) ? '回答正确' : ansArray.length ? '回答错误' : '未作答'}</div><div>你的答案：${escapeHtml(ansArray.join(',') || '未作答')}；正确答案：${escapeHtml(q.answer)}</div><div class="analysis">解析：${escapeHtml(q.analysis)}</div></div>` : '';
    
    const body = `<div class="options">${q.options.map(opt => `<label class="option"><input type="checkbox" name="${q.id}" value="${escapeHtml(opt.key)}" ${ansArray.includes(opt.key)?'checked':''}> <b>${escapeHtml(opt.key)}.</b> <span>${escapeHtml(opt.text)}</span></label>`).join('')}</div>`;
    return `<article class="question-card ${statusClass}" data-id="${q.id}"><div class="q-head"><div class="badge">${escapeHtml(q.section)} · 第 ${q.number} 题</div><div class="badge">多选题</div></div><div class="q-title">${escapeHtml(q.question)}</div>${body}${objectiveResult}</article>`;
  }
  return originalRenderQuestion(q);
};

const originalBindInputs = bindInputs;
bindInputs = () => {
  originalBindInputs();
  document.querySelectorAll('input[type="checkbox"]').forEach(input => input.onchange = e => { 
    const qid = e.target.name;
    let arr = state.answers[qid] || [];
    if (!Array.isArray(arr)) arr = [arr].filter(Boolean);
    if (e.target.checked) { if (!arr.includes(e.target.value)) arr.push(e.target.value); }
    else { arr = arr.filter(v => v !== e.target.value); }
    arr.sort();
    state.answers[qid] = arr;
    updateStats(); 
  });
};

const originalIsCorrect = isCorrect;
isCorrect = (q) => {
  if (_isMType(q)) {
    const ansArray = state.answers[q.id] || [];
    const ansStr = Array.isArray(ansArray) ? ansArray.sort().join('') : (ansArray || '');
    return ansStr === q.answer;
  }
  return originalIsCorrect(q);
};

const originalIsWrong = isWrong;
isWrong = (q) => {
  if (_isMType(q)) {
    const ansArray = state.answers[q.id] || [];
    return state.submitted && ansArray.length > 0 && !isCorrect(q);
  }
  return originalIsWrong(q);
};

// Keyboard bindings
window.addEventListener('keydown', e => {
  if (!isImmersive) return;
  const tagName = e.target.tagName.toLowerCase();
  if (tagName === 'input' || tagName === 'textarea') return;
  
  if (!immQuestions.length) return;
  const q = immQuestions[immIndex];
  
  if (e.key === 'ArrowLeft') {
    if (immIndex > 0) { immIndex--; renderImmersive(); }
    e.preventDefault();
  } else if (e.key === 'ArrowRight') {
    if (immIndex < immQuestions.length - 1) { immIndex++; renderImmersive(); }
    e.preventDefault();
  } else if (e.key === 'Enter') {
    immSubmittedIds.add(q.id);
    renderImmersive();
    updateStats();
    e.preventDefault();
  } else {
    // Check index via keys: 1,2,3,4, a,b,c,d, t,f
    const keyMap = { '1': 0, 'a': 0, '2': 1, 'b': 1, '3': 2, 'c': 2, '4': 3, 'd': 3, 't': 0, 'f': 1 };
    const k = e.key.toLowerCase();
    
    if (keyMap[k] !== undefined && q.type !== 'text') {
      const idx = keyMap[k];
      let mappedKey = null;
      
      if (q.type === 'judge') {
        if (q.options && q.options.length > idx) {
           mappedKey = q.options[idx].key;
        } else if (idx === 0) {
           mappedKey = (q.answer === '√' || q.answer === '×') ? '√' : '正确';
        } else if (idx === 1) {
           mappedKey = (q.answer === '√' || q.answer === '×') ? '×' : '错误';
        }
      } else if (q.options && q.options.length > idx) {
        mappedKey = q.options[idx].key;
      }
      
      if (mappedKey !== null) {
        if (_isMType(q)) {
          let arr = state.answers[q.id] || [];
          if (!Array.isArray(arr)) arr = [arr].filter(Boolean);
          if (arr.includes(mappedKey)) {
            arr = arr.filter(v => v !== mappedKey);
          } else {
            arr.push(mappedKey);
          }
          arr.sort();
          state.answers[q.id] = arr;
        } else {
          state.answers[q.id] = mappedKey;
        }
        renderImmersive();
        updateStats();
        e.preventDefault();
      }
    }
  }
});

const bgmAudio = document.getElementById('bgmAudio');
const bgmToggleBtn = document.getElementById('bgmToggleBtn');
if (bgmToggleBtn && bgmAudio) {
  bgmToggleBtn.addEventListener('click', () => {
    if (bgmAudio.paused) {
      bgmAudio.play();
      bgmToggleBtn.classList.add('playing');
    } else {
      bgmAudio.pause();
      bgmToggleBtn.classList.remove('playing');
    }
  });
}

</script>
