<head>

<title>习近平新时代中国特色社会主义思想概论（习概）做题版</title>
<style>
:root { --bg:#f5f7fb; --card:#fff; --text:#1f2937; --muted:#6b7280; --primary:#2563eb; --ok:#16a34a; --bad:#dc2626; --line:#e5e7eb; --warn:#d97706; }
* { box-sizing: border-box; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; color:var(--text); background:linear-gradient(180deg,#eef4ff 0,var(--bg) 260px); }
header { position:sticky; top:0; z-index:10; background:rgba(255,255,255,.92); backdrop-filter: blur(12px); border-bottom:1px solid var(--line); }
.header-inner { max-width:1180px; margin:auto; padding:16px 20px; display:flex; gap:16px; justify-content:space-between; align-items:center; flex-wrap:wrap; }
h1 { font-size:22px; margin:0 0 6px; }
.subtitle { color:var(--muted); font-size:13px; }
.toolbar { display:flex; flex-wrap:wrap; gap:8px; }
button, select { border:1px solid var(--line); background:#fff; color:var(--text); padding:9px 12px; border-radius:10px; cursor:pointer; font-size:14px; }
button.primary { background:var(--primary); color:#fff; border-color:var(--primary); }
button.danger { color:var(--bad); }
button:disabled { opacity:.45; cursor:not-allowed; }
main { max-width:1180px; margin:22px auto 80px; padding:0 20px; display:grid; grid-template-columns: 250px 1fr; gap:20px; }
aside { position:sticky; top:92px; align-self:start; background:var(--card); border:1px solid var(--line); border-radius:18px; padding:16px; box-shadow:0 10px 28px rgba(15,23,42,.06); }
.stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.stat { background:#f8fafc; border-radius:12px; padding:12px; }
.stat b { display:block; font-size:22px; }
.nav-title { margin:18px 0 10px; font-weight:700; }
.section-tabs { display:grid; gap:8px; }
.section-tabs button { text-align:left; }
.section-tabs button.active { background:#dbeafe; border-color:#93c5fd; color:#1d4ed8; font-weight:700; }
.content { display:grid; gap:16px; }
.question-card { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:18px; box-shadow:0 10px 28px rgba(15,23,42,.06); }
.question-card.correct { border-color:#86efac; }
.question-card.wrong { border-color:#fca5a5; }
.q-head { display:flex; justify-content:space-between; gap:12px; margin-bottom:12px; }
.badge { display:inline-flex; align-items:center; gap:6px; font-size:12px; padding:4px 9px; border-radius:999px; background:#eef2ff; color:#3730a3; white-space:nowrap; }
.q-title { font-weight:700; line-height:1.7; white-space:pre-wrap; }
.options { display:grid; gap:9px; margin-top:12px; }
.option { display:flex; gap:10px; align-items:flex-start; border:1px solid var(--line); border-radius:12px; padding:11px 12px; cursor:pointer; }
.option:hover { border-color:#93c5fd; background:#f8fbff; }
.option input { margin-top:3px; }
textarea { width:100%; min-height:120px; resize:vertical; border:1px solid var(--line); border-radius:12px; padding:12px; font:14px/1.7 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace; }
.result { display:none; margin-top:14px; padding:14px; border-radius:12px; background:#f8fafc; border:1px solid var(--line); line-height:1.7; }
.result.show { display:block; }
.result .ok { color:var(--ok); font-weight:700; }
.result .bad { color:var(--bad); font-weight:700; }
.analysis { margin-top:8px; white-space:pre-wrap; }
.self-check { display:flex; gap:8px; margin-top:10px; }
.hidden { display:none !important; }
.empty { text-align:center; color:var(--muted); padding:44px; background:#fff; border:1px dashed var(--line); border-radius:18px; }
@media (max-width: 860px) { main { grid-template-columns:1fr; } aside { position:static; } }
[data-theme="dark"] { --bg:#1e1e20; --card:#252529; --text:rgba(255, 255, 255, 0.87); --muted:rgba(235, 235, 245, 0.6); --line:#32363f; }
[data-theme="dark"] body { background: linear-gradient(180deg, #1b1b1f 0, var(--bg) 260px); }
[data-theme="dark"] header { background: rgba(30, 30, 32, 0.92); }
[data-theme="dark"] button, [data-theme="dark"] select { background: #313136; color: var(--text); border-color: var(--line); }
[data-theme="dark"] .stat { background: #313136; }
[data-theme="dark"] .section-tabs button.active { background: #1a2a4b; border-color: #3451b2; color: #a8b1ff; }
[data-theme="dark"] .badge { background: #262c45; color: #a8b1ff; }
[data-theme="dark"] .option:hover { background: #313136; border-color: #3451b2; }
[data-theme="dark"] .result { background: #313136; border-color: var(--line); }
[data-theme="dark"] .empty { background: var(--card); }
[data-theme="dark"] textarea { background: #1e1e20; color: var(--text); border-color: var(--line); }
[data-theme="dark"] .question-card.correct { border-color: #1a4f32; }
[data-theme="dark"] .question-card.wrong { border-color: #7f1d1d; }
.theme-toggle { padding: 8px 10px; display: inline-flex; align-items: center; justify-content: center; }
.theme-toggle svg { width: 16px; height: 16px; }
.theme-toggle .moon { display: none; }
[data-theme="dark"] .theme-toggle .sun { display: none; }
[data-theme="dark"] .theme-toggle .moon { display: block; }
</style>

<script>
const QUESTIONS = [{"id": "导论-1", "section": "导论", "type": "single", "number": 1, "question": "中国化时代化的马克思主义的“魂脉”和“根脉”是( )", "options": [{"key": "A", "text": "马克思主义和中华优秀传统文化"}, {"key": "B", "text": "共产主义社会理想和“天下大同”理想"}, {"key": "C", "text": "全人类共同价值和社会主义核心价值观"}, {"key": "D", "text": "共产主义远大理想和中国特色社会主义共同理想"}], "answer": "A", "analysis": "** 本题考查“两个结合”的基础判断。马克思主义提供理论之魂，中华优秀传统文化提供文化之根，二者共同构成中国化时代化马克思主义的根基。"}, {"id": "导论-2", "section": "导论", "type": "single", "number": 2, "question": "( )是改革开放以来我们党全部理论和实践的鲜明主题。", "options": [{"key": "A", "text": "贯彻新发展理念"}, {"key": "B", "text": "坚持和发展中国特色社会主义"}, {"key": "C", "text": "改革开放"}, {"key": "D", "text": "以经济建设为中心"}], "answer": "B", "analysis": "** 改革开放以来，党的理论创新和实践探索始终围绕中国特色社会主义展开，因此它是全部理论和实践的鲜明主题，而不是某一具体政策。"}, {"id": "导论-3", "section": "导论", "type": "single", "number": 3, "question": "(  )是新时代党和国家事业取得历史性成就、发生历史性变革的决定性因素，是党和人民应对一切不确定性的最大确定性、最大底气、最大保证。", "options": [{"key": "A", "text": "“两个确立”"}, {"key": "B", "text": "“四个自信”"}, {"key": "C", "text": "“两个维护”"}, {"key": "D", "text": "“三个务必”"}], "answer": "A", "analysis": "** “两个确立”确立核心和指导思想地位，是新时代党和国家事业发展的根本政治前提，所以被称为最大确定性、底气和保证。"}, {"id": "导论-4", "section": "导论", "type": "single", "number": 4, "question": "习近平新时代中国特色社会主义思想续写了( )新篇章。", "options": [{"key": "A", "text": "马克思主义中国化时代化"}, {"key": "B", "text": "新时代新作为"}, {"key": "C", "text": "高质量发展"}, {"key": "D", "text": "新发展理念"}], "answer": "A", "analysis": "** 习近平新时代中国特色社会主义思想立足新时代中国实践，丰富发展了马克思主义，因此续写的是马克思主义中国化时代化的新篇章。"}, {"id": "导论-5", "section": "导论", "type": "single", "number": 5, "question": "三大时代课题是理解习近平新时代中国特色社会主义思想的“理论之眼”，其中( )回答的是方向性质问题。", "options": [{"key": "A", "text": "新时代坚持和发展什么样的社会主义、怎样坚持和发展社会主义"}, {"key": "B", "text": "新时代坚持和发展什么样的中国特色社会主义、怎样坚持和发展中国特色社会主义"}, {"key": "C", "text": "建设什么样的社会主义现代化强国、怎样建设社会主义现代化强国"}, {"key": "D", "text": "建设什么样的长期执政的马克思主义政党、怎样建设长期执政的马克思主义政党"}], "answer": "B", "analysis": "** 三大时代课题中，“坚持和发展什么样的中国特色社会主义、怎样坚持和发展中国特色社会主义”解决道路、方向和性质问题。"}, {"id": "导论-6", "section": "导论", "type": "single", "number": 6, "question": "党的二十大提出的(  )，是习近平新时代中国特色社会主义思想的世界观、方法论和贯穿其中的立场观点方法的重要体现。", "options": [{"key": "A", "text": "“三个务必”"}, {"key": "B", "text": "“六个必须坚持”"}, {"key": "C", "text": "“五个必由之路”"}, {"key": "D", "text": "中国式现代化"}], "answer": "B", "analysis": "** “六个必须坚持”概括了新思想的立场观点方法，集中体现世界观和方法论；“三个务必”等更多是政治要求或战略概括。"}, {"id": "导论-7", "section": "导论", "type": "multi", "number": 7, "question": "习近平新时代中国特色社会主义思想创立的时代背景是( )", "options": [{"key": "A", "text": "世界百年未有之大变局加速演进"}, {"key": "B", "text": "新时代中国正处于中华民族伟大复兴的关键时期"}, {"key": "C", "text": "我国经济高速度发展"}, {"key": "D", "text": "中国成为世界领导角色"}], "answer": "AB", "analysis": "** 新思想形成于世界百年变局加速演进、中华民族复兴进入关键时期的背景下，高速度发展和世界领导角色不是准确表述。"}, {"id": "导论-8", "section": "导论", "type": "multi", "number": 8, "question": "习近平新时代中国特色社会主义思想回答了( )重大时代课题。", "options": [{"key": "A", "text": "新时代坚持和发展什么样的中国特色社会主义、怎样坚持和发展中国特色社会主义"}, {"key": "B", "text": "建设什么样的社会主义现代化强国、怎样建设社会主义现代化强国"}, {"key": "C", "text": "建设什么样的长期执政的马克思主义政党、怎样建设长期执政的马克思主义政党"}, {"key": "D", "text": "建设什么美好的世界。怎样建设美好世界"}], "answer": "ABC", "analysis": "** 新思想围绕三个重大时代课题展开：坚持发展中国特色社会主义、建设现代化强国、建设长期执政的马克思主义政党。"}, {"id": "导论-9", "section": "导论", "type": "multi", "number": 9, "question": "习近平新时代中国特色社会主义思想的主要内容包括( )。", "options": [{"key": "A", "text": "“六个必须坚持”"}, {"key": "B", "text": "“十个明确”"}, {"key": "C", "text": "“十四个坚持”"}, {"key": "D", "text": "“十三个方面成就”"}], "answer": "BCD", "analysis": "** “十个明确”“十四个坚持”“十三个方面成就”共同构成新思想主要内容；“六个必须坚持”重在世界观方法论。"}, {"id": "导论-10", "section": "导论", "type": "multi", "number": 10, "question": "《中共中央关于党的百年奋斗重大成就和历史经验的决议》中“两个确立”的提出，具有重要意义。“两个确立”是指( )", "options": [{"key": "A", "text": "确立中国共产党的领导地位"}, {"key": "B", "text": "确立习近平同志党中央的核心、全党的核心地位"}, {"key": "C", "text": "确立马克思主义理论的指导地位"}, {"key": "D", "text": "确立习近平新时代中国特色社会主义思想的指导地位"}], "answer": "BD", "analysis": "** “两个确立”指确立习近平同志党中央核心、全党核心地位，确立习近平新时代中国特色社会主义思想的指导地位。"}, {"id": "导论-11", "section": "导论", "type": "multi", "number": 11, "question": "习近平新时代中国特色社会主义思想是马克思主义基本原理(  )的重大成果，是坚持“两个结合”的光辉典范。", "options": [{" tion": "第十章", "type": "multi", "number": 11, "question": "像爱惜自己的生命一样保护好文化遗产，守护好中华文脉。因为(    )。", "options": [{"key": "A", "text": "文化遗产承载灿烂文明"}, {"key": "B", "text": "传承历史文化"}, {"key": "C", "text": "维系民族精神"}, {"key": "D", "text": "加强社会主义精神文明建设的深厚滋养"}], "answer": "ABCD", "analysis": "** 文化遗产承载文明、传承历史、维系民族精神，也是加强社会主义精神文明建设的重要滋养。"}, {"id": "第十章-12", "section": "第十章", "type": "multi", "number": 12, "question": "下列中国共产党人精神谱系中，属于中国特色社会主义进入新时代铸就的伟大精神的有(   )", "options": [{"key": "A", "text": "脱贫攻坚精神"}, {"key": "B", "text": "抗疫精神"}, {"key": "C", "text": "载人航天精神"}, {"key": "D", "text": "探月精神"}], "answer": "ABD", "analysis": "** 脱贫攻坚精神、抗疫精神、探月精神都形成于新时代实践；载人航天精神产生更早。"}, {"id": "第十章-13", "section": "第十章", "type": "multi", "number": 13, "question": "100多年前，中国共产党的先驱们创建了中国共产党,形成了( )的伟大建党精神。", "options": [{"key": "A", "text": "坚持真理、坚守理想"}, {"key": "B", "text": "践行初心、担当使命"}, {"key": "C", "text": "不怕牺牲、英勇斗争"}, {"key": "D", "text": "对党忠诚、不负人民"}], "answer": "ABCD", "analysis": "** 伟大建党精神包括坚持真理坚守理想、践行初心担当使命、不怕牺牲英勇斗争、对党忠诚不负人民。"}, {"id": "第十一章-1", "section": "第十一章", "type": "single", "number": 1, "question": "(    )是“国之大者”。", "options": [{"key": "A", "text": "人才辈出"}, {"key": "B", "text": "让人民生活幸福"}, {"key": "C", "text": "建立强大的军队"}, {"key": "D", "text": "实现社会主义现代化"}], "answer": "B", "analysis": "** “国之大者”强调党和国家最根本关切。让人民生活幸福体现以人民为中心，是最大的政治。"}, {"id": "第十一章-2", "section": "第十一章", "type": "single", "number": 2, "question": "(    )是改善民生的物质基础，离开(    )谈改善民生是无源之水、无土之木。", "options": [{"key": "A", "text": "发展;社会"}, {"key": "B", "text": "社会;社会"}, {"key": "C", "text": "社会;发展"}, {"key": "D", "text": "发展;发展"}], "answer": "D", "analysis": "** 改善民生必须以发展为物质基础，离开发展谈民生就缺少财力、产业和就业支撑。"}, {"id": "第十一章-3", "section": "第十一章", "type": "single", "number": 3, "question": "(    )是最大的民生工程、民心工程、根基工程，是社会稳定的重要保障。", "options": [{"key": "A", "text": "就业"}, {"key": "B", "text": "分配"}, {"key": "C", "text": "健康"}, {"key": "D", "text": "劳动"}], "answer": "A", "analysis": "** 就业直接关系群众收入、家庭生活和社会稳定，因此是最大的民生工程、民心工程和根基工程。"}, {"id": 必须始终遵循的重要理念。", "options": [{"key": "A", "text": "共谋"}, {"key": "B", "text": "共建"}, {"key": "C", "text": "共治"}, {"key": "D", "text": "共享"}], "answer": "BCD", "analysis": "** 完善社会治理必须坚持共建共治共享，保障人民参与治理权利并共享治理成果。"}, {"id": "第十一章-10", "section": "第十一章", "type": "multi", "number": 10, "question": "党的十八大以来，以习近平同志为核心的党中央高度重视民生问题，着力解决人民群众急难愁盼问题，扎实推进共同富裕，不断增强人民( )", "options": [{"key": "A", "text": "幸福感"}, {"key": "B", "text": "获得感"}, {"key": "C", "text": "安全感"}, {"key": "D", "text": "得到感"}], "answer": "ABC", "analysis": "** 新时代民生工作聚焦急难愁盼，扎实推进共同富裕，目标是增强人民获得感、幸福感、安全感。"}, {"id": "第十一章-11", "section": "第十一章", "type": "multi", "number": 11, "question": "社会保障体系主要涉及( )等方面。", "options": [{"key": "A", "text": "社会保险"}, {"key": "B", "text": "社会救助"}, {"key": "C", "text": "社会福利"}, {"key": "D", "text": "社会优抚"}], "answer": "ABCD", "analysis": "** 社会保障体系覆盖社会保险、社会救助、社会福利、社会优抚等，是民生安全网的重要组成。"}, {"id": "第十一章-12", "section": "第十一章", "type": "multi", "number": 12, "question": "党的十八大以来，我国社会治理体系不断完善，共建共治共享的社会治理制度进一步健全，社会治理(      )水平大幅度提高。", "options": [{"key": "A", "text": "社会化"}, {"key": "B", "text": "法治化"}, {"key": "C", "text": "智能化"}, {"key": "D", "text": "专业化"}], "answer": "ABCD", "analysis": "** 新时代社会治理水平提升，表现为社会化、法治化、智能化、专业化同步增强。"}, {"id": "第十二章-1", "section": "第十二章", "type": "single", "number": 1, "question": "(   )是关系中华民族永续发展的根本大计。", "options": [{"key": "A", "text": "经济建设"}, {"key": "B", "text": "文化建设"}, {"key": "C", "text": "生态文明建设"}, {"key": "D", "text": "政治建设"}], "answer": "C", "analysis": "** 生态文明建设关系资源环境承载力和民族未来，是中华民族永续发展的根本大计。"}, {"id": "第十二章-2", "section": "第十二章", "type": "single", "number": 2, "question": "习近平指出:“(   )是最公平的公共产品，是最普惠的民生福祉。”。", "options": [{"key": "A", "text": "一带一路"}, {"key": "B", "text": "法律面前人人平等"}, {"key": "C", "text": "按劳分配"}, {"key": "D", "text": "良好的生态环境"}], "answer": "D", "analysis": "** 良好生态环境人人共享、人人受益，因此被称为最公平的公共产品和最普惠的民生福祉。"}, {"id": "第十二章-3", "section": "第十二章", "type": "single", "number": 3, "question": "(    )是工业文明发展到一定阶段的产物，是人类社会进步的重大成果。", "options": [{" , {"key": "C", "text": "我们党立志于中华民族千秋伟业，始终坚守初心使命"}, {"key": "D", "text": "以上都正确"}], "answer": "ABCD", "analysis": "** 党没有任何自己特殊利益，立志民族千秋伟业，才能以高度自信坚持真理、修正错误。"}, {"id": "第十六、十七章-21", "section": "第十六、十七章", "type": "multi", "number": 21, "question": "党的二十大报告指出，中国共产党立志于中华民族千秋伟业，致力于人类和平与发展崇高事业，全党同志要始终牢记“三个务必”，这“三个务必”是(    )。", "options": [{"key": "A", "text": "务必不忘初心、牢记使命"}, {"key": "B", "text": "务必谦虚谨慎、艰苦奋斗"}, {"key": "C", "text": "务必贯彻好群众路线"}, {"key": "D", "text": "务必敢于斗争、善于斗争"}], "answer": "ABD", "analysis": "** “三个务必”要求全党不忘初心使命、谦虚谨慎艰苦奋斗、敢于斗争善于斗争。"}, {"id": "第十六、十七章-22", "section": "第十六、十七章", "type": "multi", "number": 22, "question": "(    )是党对领导干部提出的政治要求。", "options": [{"key": "A", "text": "忠诚"}, {"key": "B", "text": "干净"}, {"key": "C", "text": "担当"}, {"key": "D", "text": "务实"}], "answer": "ABC", "analysis": "** 忠诚、干净、担当集中体现党对领导干部的政治要求，分别对应政治品格、廉洁底线和履职责任。"}, {"id": "第十六、十七章-23", "section": "第十六、十七章", "type": "multi", "number": 23, "question": "以习近平同志为核心的党中央统揽(   )，以刀刃向内的自我革命精神深入推进全面从严治党，推动中国特色社会主义事业展现出更为广阔的发展前景,党在革命性锻造中更加坚强有力。", "options": [{"key": "A", "text": "伟大斗争"}, {"key": "B", "text": "伟大工程"}, {"key": "C", "text": "伟大事业"}, {"key": "D", "text": "伟大梦想"}], "answer": "ABCD", "analysis": "** 党中央统揽伟大斗争、伟大工程、伟大事业、伟大梦想，以自我革命推进全面从严治党和事业发展。"}];
const state = { answers: {}, submitted: false, wrongOnly: false };
const sections = ['全部', ...Array.from(new Set(QUESTIONS.map(q => q.section)))];
const $ = id => document.getElementById(id);
const escapeHtml = value => String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));

function isMulti(q) { return q.type === 'multi'; }

function isAnswered(q) {
  if (isMulti(q)) {
    const sel = state.answers[q.id];
    return Array.isArray(sel) && sel.length > 0;
  }
  return Boolean(state.answers[q.id]);
}

function isCorrect(q) {
  if (isMulti(q)) {
    const sel = state.answers[q.id];
    if (!Array.isArray(sel) || sel.length === 0) return false;
    const correct = q.answer.split('').sort().join('');
    const selected = [...sel].sort().join('');
    return correct === selected;
  }
  return state.answers[q.id] === q.answer;
}

function isWrong(q) {
  if (!state.submitted) return false;
  if (!isAnswered(q)) return false;
  return !isCorrect(q);
}

function getMultiDisplay(q) {
  const sel = state.answers[q.id] || [];
  return Array.isArray(sel) ? sel.sort().join('') : '';
}

function renderFilters() {
  const currentSection = $('sectionFilter').value || '全部';
  $('sectionFilter').innerHTML = sections.map(s => '<option value="' + escapeHtml(s) + '">' + escapeHtml(s) + '</option>').join('');
  $('sectionFilter').value = sections.includes(currentSection) ? currentSection : '全部';
  $('sectionTabs').innerHTML = sections.map(s => '<button data-section="' + escapeHtml(s) + '" class="' + (s === $('sectionFilter').value ? 'active' : '') + '">' + escapeHtml(s) + '（' + (s==='全部'?QUESTIONS.length:QUESTIONS.filter(q=>q.section===s).length) + '）</button>').join('');
  document.querySelectorAll('#sectionTabs button').forEach(btn => btn.onclick = () => {
    $('sectionFilter').value = btn.dataset.section;
    render();
    $('questionList').scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
}

function renderQuestion(q) {
  const statusClass = state.submitted ? (isCorrect(q) ? 'correct' : isWrong(q) ? 'wrong' : '') : '';
  const answer = isMulti(q) ? getMultiDisplay(q) : (state.answers[q.id] || '');
  const resultVisible = state.submitted ? 'show' : '';
  const multiHint = isMulti(q) ? '<div style="margin-top:6px;font-size:12px;color:var(--warn);">多选题：需选中全部正确选项才能得分</div>' : '';
  let objectiveResult = '';
  if (state.submitted) {
    if (isMulti(q)) {
      objectiveResult = '<div class="result ' + resultVisible + '"><div class="' + (isCorrect(q) ? 'ok' : 'bad') + '">' + (isCorrect(q) ? '回答正确' : answer ? '回答错误' : '未作答') + '</div><div>你的答案：' + escapeHtml(answer || '未作答') + '；正确答案：' + escapeHtml(q.answer) + '</div><div class="analysis">解析：' + escapeHtml(q.analysis) + '</div></div>';
    } else {
      objectiveResult = '<div class="result ' + resultVisible + '"><div class="' + (isCorrect(q) ? 'ok' : 'bad') + '">' + (isCorrect(q) ? '回答正确' : answer ? '回答错误' : '未作答') + '</div><div>你的答案：' + escapeHtml(answer || '未作答') + '；正确答案：' + escapeHtml(q.answer) + '</div><div class="analysis">解析：' + escapeHtml(q.analysis) + '</div></div>';
    }
  }
  let body = '';
  if (isMulti(q)) {
    const sel = state.answers[q.id] || [];
    body = '<div class="options">' + q.options.map(opt => '<label class="option"><input type="checkbox" data-multi="' + q.id + '" value="' + escapeHtml(opt.key) + '" ' + (Array.isArray(sel) && sel.includes(opt.key) ? 'checked' : '') + '> <b>' + escapeHtml(opt.key) + '.</b> <span>' + escapeHtml(opt.text) + '</span></label>').join('') + '</div>' + multiHint;
  } else {
    body = '<div class="options">' + q.options.map(opt => '<label class="option"><input type="radio" name="' + q.id + '" value="' + escapeHtml(opt.key) + '" ' + (answer===opt.key?'checked':'') + '> <b>' + escapeHtml(opt.key) + '.</b> <span>' + escapeHtml(opt.text) + '</span></label>').join('') + '</div>';
  }
  const typeBadge = isMulti(q) ? '多选题' : '单选题';
  return '<article class="question-card ' + statusClass + '" data-id="' + q.id + '"><div class="q-head"><div class="badge">' + escapeHtml(q.section) + ' · 第 ' + q.number + ' 题</div><div class="badge">' + typeBadge + '</div></div><div class="q-title">' + escapeHtml(q.question) + '</div>' + body + objectiveResult + '</article>';
}

function filteredQuestions() {
  const section = $('sectionFilter').value || '全部';
  return QUESTIONS.filter(q => {
    if (section !== '全部' && q.section !== section) return false;
    if (state.wrongOnly && !isWrong(q)) return false;
    return true;
  });
}

function render() {
  renderFilters();
  const list = filteredQuestions();
  $('questionList').innerHTML = list.length ? list.map(renderQuestion).join('') : '<div class="empty">当前筛选条件下没有题目。</div>';
  bindInputs();
  updateStats();
}

function bindInputs() {
  document.querySelectorAll('input[type="radio"]').forEach(input => input.onchange = e => {
    state.answers[e.target.name] = e.target.value;
    updateStats();
  });
  document.querySelectorAll('input[type="checkbox"][data-multi]').forEach(input => input.onchange = e => {
    const qid = e.target.dataset.multi;
    if (!state.answers[qid]) state.answers[qid] = [];
    if (!Array.isArray(state.answers[qid])) state.answers[qid] = [];
    const val = e.target.value;
    if (e.target.checked) {
      if (!state.answers[qid].includes(val)) state.answers[qid].push(val);
    } else {
      state.answers[qid] = state.answers[qid].filter(v => v !== val);
    }
    updateStats();
  });
}

function updateStats() {
  $('totalCount').textContent = QUESTIONS.length;
  $('answeredCount').textContent = QUESTIONS.filter(isAnswered).length;
  $('correctCount').textContent = QUESTIONS.filter(q => state.submitted && isCorrect(q)).length;
  $('wrongCount').textContent = QUESTIONS.filter(isWrong).length;
}

function exportWrong() {
  const wrong = QUESTIONS.filter(isWrong);
  if (!wrong.length) { alert('当前没有错题可导出。'); return; }
  const nl = String.fromCharCode(10);
  const br = '<br>';
  const rows = wrong.map(q => {
    const yourAnswer = isMulti(q) ? getMultiDisplay(q) : (state.answers[q.id] || '未作答');
    return '<section><h2>' + escapeHtml(q.section) + ' 第 ' + q.number + ' 题（' + (isMulti(q) ? '多选' : '单选') + '）</h2><p>' + escapeHtml(q.question).split(nl).join(br) + '</p><p><b>你的答案：</b>' + escapeHtml(yourAnswer || '未作答').split(nl).join(br) + '</p><p><b>正确答案：</b>' + escapeHtml(q.answer).split(nl).join(br) + '</p><p><b>解析：</b>' + escapeHtml(q.analysis).split(nl).join(br) + '</p></section>';
  }).join(nl);
  const doc = '<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><title>习概错题导出</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;line-height:1.7;max-width:920px;margin:30px auto;padding:0 18px}section{border:1px solid #ddd;border-radius:12px;padding:16px;margin:14px 0}h1{color:#1d4ed8}</style></head><body><h1>习概错题导出</h1><p>共 ' + wrong.length + ' 道错题，导出时间：' + new Date().toLocaleString() + '</p>' + rows + '</body></html>';
  const blob = new Blob([doc], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '习概错题导出.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

$('submitBtn').onclick = () => { state.submitted = true; state.wrongOnly = false; $('wrongOnlyBtn').textContent = '只看错题'; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
$('wrongOnlyBtn').onclick = () => { state.wrongOnly = !state.wrongOnly; $('wrongOnlyBtn').textContent = state.wrongOnly ? '查看全部' : '只看错题'; render(); };
$('exportBtn').onclick = exportWrong;
$('resetBtn').onclick = () => { if (!confirm('确定要清空所有作答记录吗？')) return; state.answers = {}; state.submitted = false; state.wrongOnly = false; $('wrongOnlyBtn').textContent = '只看错题'; render(); };
$('sectionFilter').onchange = render;
render();

const themeToggleBtn = $('themeToggleBtn');
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('quiz-theme', theme);
}
const savedTheme = localStorage.getItem('quiz-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
setTheme(savedTheme);
themeToggleBtn.onclick = () => {
  const currentTheme = document.documentElement.getAttribute('data-theme');
  setTheme(currentTheme === 'dark' ? 'light' : 'dark');
};
</script>
