<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>软件项目管理做题版</title>
<style>
:root { --bg:#f5f7fb; --card:#fff; --text:#1f2937; --muted:#6b7280; --primary:#2563eb; --ok:#16a34a; --bad:#dc2626; --line:#e5e7eb; --warn:#d97706; }
* { box-sizing: border-box; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; color:var(--text); background:linear-gradient(180deg,#eef4ff 0,var(--bg) 260px); }
header { position:sticky; top:0; z-index:10; background:rgba(255,255,255,.92); backdrop-filter: blur(12px); border-bottom:1px solid var(--line); }
.header-inner { max-width:1180px; margin:auto; padding:16px 20px; display:flex; gap:16px; justify-content:space-between; align-items:center; flex-wrap:wrap; }
h1 { font-size:22px; margin:0 0 6px; }
.subtitle { color:var(--muted); font-size:13px; }
.toolbar { display:flex; flex-wrap:wrap; gap:8px; }
button, select { border:1px solid var(--line); background:#fff; color:var(--text); padding:9px 12px; border-radius:10px; cursor:pointer; font-size:14px; }
button.primary { background:var(--primary); color:#fff; border-color:var(--primary); }
button.danger { color:var(--bad); }
button:disabled { opacity:.45; cursor:not-allowed; }
main { max-width:1180px; margin:22px auto 80px; padding:0 20px; display:grid; grid-template-columns: 250px 1fr; gap:20px; }
aside { position:sticky; top:92px; align-self:start; background:var(--card); border:1px solid var(--line); border-radius:18px; padding:16px; box-shadow:0 10px 28px rgba(15,23,42,.06); }
.stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.stat { background:#f8fafc; border-radius:12px; padding:12px; }
.stat b { display:block; font-size:22px; }
.nav-title { margin:18px 0 10px; font-weight:700; }
.section-tabs { display:grid; gap:8px; }
.section-tabs button { text-align:left; }
.section-tabs button.active { background:#dbeafe; border-color:#93c5fd; color:#1d4ed8; font-weight:700; }
.content { display:grid; gap:16px; }
.question-card { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:18px; box-shadow:0 10px 28px rgba(15,23,42,.06); }
.question-card.correct { border-color:#86efac; }
.question-card.wrong { border-color:#fca5a5; }
.q-head { display:flex; justify-content:space-between; gap:12px; margin-bottom:12px; }
.badge { display:inline-flex; align-items:center; gap:6px; font-size:12px; padding:4px 9px; border-radius:999px; background:#eef2ff; color:#3730a3; white-space:nowrap; }
.q-title { font-weight:700; line-height:1.7; white-space:pre-wrap; }
.options { display:grid; gap:9px; margin-top:12px; }
.option { display:flex; gap:10px; align-items:flex-start; border:1px solid var(--line); border-radius:12px; padding:11px 12px; cursor:pointer; }
.option:hover { border-color:#93c5fd; background:#f8fbff; }
.option input { margin-top:3px; }
textarea { width:100%; min-height:120px; resize:vertical; border:1px solid var(--line); border-radius:12px; padding:12px; font:14px/1.7 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace; }
.result { display:none; margin-top:14px; padding:14px; border-radius:12px; background:#f8fafc; border:1px solid var(--line); line-height:1.7; }
.result.show { display:block; }
.result .ok { color:var(--ok); font-weight:700; }
.result .bad { color:var(--bad); font-weight:700; }
.analysis { margin-top:8px; white-space:pre-wrap; }
.self-check { display:flex; gap:8px; margin-top:10px; }
.hidden { display:none !important; }
.empty { text-align:center; color:var(--muted); padding:44px; background:#fff; border:1px dashed var(--line); border-radius:18px; }
@media (max-width: 860px) { main { grid-template-columns:1fr; } aside { position:static; } }
[data-theme="dark"] { --bg:#1e1e20; --card:#252529; --text:rgba(255, 255, 255, 0.87); --muted:rgba(235, 235, 245, 0.6); --line:#32363f; }
[data-theme="dark"] body { background: linear-gradient(180deg, #1b1b1f 0, var(--bg) 260px); }
[data-theme="dark"] header { background: rgba(30, 30, 32, 0.92); }
[data-theme="dark"] button, [data-theme="dark"] select { background: #313136; color: var(--text); border-color: var(--line); }
[data-theme="dark"] .stat { background: #313136; }
[data-theme="dark"] .section-tabs button.active { background: #1a2a4b; border-color: #3451b2; color: #a8b1ff; }
[data-theme="dark"] .badge { background: #262c45; color: #a8b1ff; }
[data-theme="dark"] .option:hover { background: #313136; border-color: #3451b2; }
[data-theme="dark"] .result { background: #313136; border-color: var(--line); }
[data-theme="dark"] .empty { background: var(--card); }
[data-theme="dark"] textarea { background: #1e1e20; color: var(--text); border-color: var(--line); }
[data-theme="dark"] .question-card.correct { border-color: #1a4f32; }
[data-theme="dark"] .question-card.wrong { border-color: #7f1d1d; }
.theme-toggle { padding: 8px 10px; display: inline-flex; align-items: center; justify-content: center; }
.theme-toggle svg { width: 16px; height: 16px; }
.theme-toggle .moon { display: none; }
[data-theme="dark"] .theme-toggle .sun { display: none; }
[data-theme="dark"] .theme-toggle .moon { display: block; }

/* 沉浸式刷题模式样式 */
body.immersive-mode main { display: none !important; }
body.immersive-mode header { display: none !important; }
.immersive-container { display: none; }
body.immersive-mode .immersive-container {
  display: flex;
  max-width: 1180px;
  margin: 0 auto;
  padding: 20px;
  height: 100vh;
  gap: 20px;
  background: var(--bg);
}
.immersive-sidebar {
  width: 280px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  box-shadow: 0 10px 28px rgba(15,23,42,.06);
  transition: width 0.3s ease, padding 0.3s ease;
  overflow: hidden;
}
.immersive-sidebar.collapsed {
  width: 0;
  padding: 0;
  border: none;
  opacity: 0;
}
.immersive-sidebar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.immersive-sidebar-header h3 { margin: 0; font-size: 16px; }
.immersive-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  overflow-y: auto;
  padding-bottom: 20px;
}
.immersive-grid button {
  padding: 8px 0;
  text-align: center;
  border-radius: 8px;
  font-weight: bold;
  border: 1px solid var(--line);
  background: var(--card);
  font-size: 13px;
}
.immersive-grid button.active {
  border-color: var(--primary);
  color: var(--primary);
  box-shadow: 0 0 0 2px rgba(37,99,235,0.2);
}
.immersive-grid button.correct { background: #dcfce7; border-color: #86efac; color: #166534; }
.immersive-grid button.wrong { background: #fee2e2; border-color: #fca5a5; color: #991b1b; }
.immersive-grid button.answered { background: #e0e7ff; border-color: #a5b4fc; color: #3730a3; }
[data-theme="dark"] .immersive-grid button.correct { background: #052e16; border-color: #14532d; color: #4ade80; }
[data-theme="dark"] .immersive-grid button.wrong { background: #450a0a; border-color: #7f1d1d; color: #f87171; }
[data-theme="dark"] .immersive-grid button.answered { background: #1e1b4b; border-color: #312e81; color: #818cf8; }

.immersive-content-wrapper {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
}
.immersive-topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.immersive-topbar button {
  padding: 6px 12px;
}
.immersive-main {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 18px;
  box-shadow: 0 10px 28px rgba(15,23,42,.06);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.immersive-question-area {
  flex: 1;
  padding: 30px;
  overflow-y: auto;
  font-size: 16px;
}
.immersive-question-area .question-card {
  border: none;
  box-shadow: none;
  padding: 0;
  margin: 0;
}
.immersive-question-area .q-title {
  font-size: 18px;
  margin-bottom: 24px;
}
.immersive-question-area .option {
  padding: 16px;
  font-size: 16px;
}
.immersive-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 30px;
  border-top: 1px solid var(--line);
  background: var(--card);
}
.immersive-footer .hints {
  color: var(--muted);
  font-size: 13px;
}
.bgm-btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; background: #eef2ff; color: #4f46e5; border: 1px solid #c7d2fe; border-radius: 999px; cursor: pointer; transition: all 0.3s; font-weight: bold; margin-right: 8px; }
.bgm-btn:hover { background: #e0e7ff; transform: scale(1.02); }
[data-theme="dark"] .bgm-btn { background: #3730a3; color: #e0e7ff; border-color: #4338ca; }
[data-theme="dark"] .bgm-btn:hover { background: #4338ca; }
.bgm-btn.playing .icon-play { display: none; }
.bgm-btn.playing .icon-pause { display: block !important; }

</style>

    .markdown-body img { max-width: 100%; height: auto; }

</head>
<body>
<header>
  <div class="header-inner">
    <div>
      <h1>软件项目管理做题版</h1>
      <div class="subtitle">单选题/多选题/判断题自动判分，多选题需选中全部正确选项，可导出错题 HTML。</div>
    </div>
    <div class="toolbar">
      <audio id="bgmAudio" src="/audio/study-music.mp3" loop></audio>

        <svg class="icon-play" viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>

        <svg class="moon" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg"><path fill="currentColor" d="M240.448 240.448a384 384 0 1 0 559.424 542.4 384 384 0 0 1-542.4-559.424m-12.8-59.52A460.8 460.8 0 1 1 843.072 843.072 460.8 460.8 0 0 0 227.648 180.928"></path></svg>

      <select id="sectionFilter"><option value="全部">全部章节</option></select>
      <button class="primary" id="submitBtn">提交判分</button>
      <button id="wrongOnlyBtn">只看错题</button>
      <button id="exportBtn">导出错题</button>
      <button class="danger" id="resetBtn">重新做题</button>
    </div>
  </div>
</header>
<main>
  <aside>
    <div class="stats">
      <div class="stat"><span>总题数</span><b id="totalCount">0</b></div>
      <div class="stat"><span>已答</span><b id="answeredCount">0</b></div>
      <div class="stat"><span>正确</span><b id="correctCount">0</b></div>
      <div class="stat"><span>错题</span><b id="wrongCount">0</b></div>
    </div>
    <div class="nav-title">章节导航</div>
    <div class="section-tabs" id="sectionTabs"></div>
  </aside>
  <section class="content" id="questionList"></section>
</main>

<div class="immersive-container" id="immersiveContainer">
  <div class="immersive-sidebar" id="immersiveSidebar">
    <div class="immersive-sidebar-header">
      <h3>题号导航</h3>
      <button id="immCloseSidebarBtn" title="收起" style="padding:4px 8px;">◀</button>
    </div>
    <div class="immersive-grid" id="immersiveGrid"></div>
  </div>
  <div class="immersive-content-wrapper">
    <div class="immersive-topbar">
      <div>
        <button id="immOpenSidebarBtn" class="hidden" title="展开题号">▶ 题号</button>
      </div>
      <div>
        <button id="immSubmitAllBtn" class="primary" style="margin-right:8px;">交卷 (全部提交)</button>
        <button id="immExitBtn" class="danger">退出沉浸模式</button>
      </div>
    </div>
    <div class="immersive-main">
      <div class="immersive-question-area" id="immersiveQuestionArea"></div>
      <div class="immersive-footer">
        <button id="immPrevBtn">上一题 (←)</button>
        <div class="hints">快捷键: 1-4/T-F 选选项，Enter 确认当前，←/→ 切题</div>
        <button id="immNextBtn">下一题 (→)</button>
      </div>
    </div>
  </div>
</div>

const state = { answers: {}, submitted: false, wrongOnly: false, selfMarks: {} };
const sections = ['全部', ...Array.from(new Set(QUESTIONS.map(q => q.section)))];
const $ = id => document.getElementById(id);
const escapeHtml = value => String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));

function isMulti(q) { return q.type === 'multi'; }
function isJudge(q) { return q.type === 'judge'; }

function isAnswered(q) {
  if (isMulti(q)) {
    const sel = state.answers[q.id];
    return Array.isArray(sel) && sel.length > 0;
  }
  return Boolean(state.answers[q.id]);
}

function isCorrect(q) {
  if (q.type === 'text') return state.selfMarks && state.selfMarks[q.id] === 'correct';
  if (isMulti(q)) {
    const sel = state.answers[q.id];
    if (!Array.isArray(sel) || sel.length === 0) return false;
    const correct = q.answer.split('').sort().join('');
    const selected = [...sel].sort().join('');
    return correct === selected;
  }
  if (isJudge(q)) {
    return state.answers[q.id] === q.answer;
  }
  return state.answers[q.id] === q.answer;
}

function isWrong(q) {
  if (q.type === 'text') return state.selfMarks && state.selfMarks[q.id] === 'wrong';
  if (!state.submitted) return false;
  if (!isAnswered(q)) return false;
  return !isCorrect(q);
}

function getMultiDisplay(q) {
  const sel = state.answers[q.id] || [];
  return Array.isArray(sel) ? sel.sort().join('') : '';
}

function renderFilters() {
  const currentSection = $('sectionFilter').value || '全部';
  $('sectionFilter').innerHTML = sections.map(s => '<option value="' + escapeHtml(s) + '">' + escapeHtml(s) + '</option>').join('');
  $('sectionFilter').value = sections.includes(currentSection) ? currentSection : '全部';
  $('sectionTabs').innerHTML = sections.map(s => '<button data-section="' + escapeHtml(s) + '" class="' + (s === $('sectionFilter').value ? 'active' : '') + '">' + escapeHtml(s) + '（' + (s==='全部'?QUESTIONS.length:QUESTIONS.filter(q=>q.section===s).length) + '）</button>').join('');
  document.querySelectorAll('#sectionTabs button').forEach(btn => btn.onclick = () => {
    $('sectionFilter').value = btn.dataset.section;
    render();
    $('questionList').scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
}

function renderQuestion(q) {
  const statusClass = state.submitted || q.type === 'text' ? (isCorrect(q) ? 'correct' : isWrong(q) ? 'wrong' : '') : '';
  const answer = isMulti(q) ? getMultiDisplay(q) : (state.answers[q.id] || '');
  const resultVisible = state.submitted ? 'show' : '';
  const multiHint = isMulti(q) ? '<div style="margin-top:6px;font-size:12px;color:var(--warn);">多选题：需选中全部正确选项才能得分</div>' : '';
  let objectiveResult = '';
  if (state.submitted && q.type !== 'text') {
    objectiveResult = '<div class="result ' + resultVisible + '"><div class="' + (isCorrect(q) ? 'ok' : 'bad') + '">' + (isCorrect(q) ? '回答正确' : answer ? '回答错误' : '未作答') + '</div><div>你的答案：' + escapeHtml(answer || '未作答') + '；正确答案：' + escapeHtml(q.answer) + '</div><div class="analysis">解析：' + escapeHtml(q.analysis) + '</div></div>';
  }
  const textResult = q.type === 'text' && state.submitted ? '<div class="result show"><div><b>参考答案/解析：</b></div><div class="analysis markdown-body">' + (typeof marked !== 'undefined' ? marked.parse(q.answer.replace(/\\/g, '\\\\')) : escapeHtml(q.answer).replace(/\n/g, '<br>')) + '</div><div class="self-check"><button data-self="correct" data-id="' + q.id + '">我答对了</button><button data-self="wrong" data-id="' + q.id + '">我答错了</button><span class="badge">' + (state.selfMarks && state.selfMarks[q.id] === 'correct' ? '已标记正确' : state.selfMarks && state.selfMarks[q.id] === 'wrong' ? '已加入错题' : '待自评') + '</span></div></div>' : '';
  let body = '';
  if (q.type === 'text') {
    body = '<textarea data-text="' + q.id + '" placeholder="在这里输入你的答案，提交后对照参考答案自评。">' + escapeHtml(answer) + '</textarea>';
  } else if (isJudge(q)) {
    body = '<div class="options"><label class="option"><input type="radio" name="' + q.id + '" value="√" ' + (answer==='√'?'checked':'') + '> <b>√</b> <span>正确</span></label><label class="option"><input type="radio" name="' + q.id + '" value="×" ' + (answer==='×'?'checked':'') + '> <b>×</b> <span>错误</span></label></div>';
  } else if (isMulti(q)) {
    const sel = state.answers[q.id] || [];
    body = '<div class="options">' + q.options.map(opt => '<label class="option"><input type="checkbox" data-multi="' + q.id + '" value="' + escapeHtml(opt.key) + '" ' + (Array.isArray(sel) && sel.includes(opt.key) ? 'checked' : '') + '> <b>' + escapeHtml(opt.key) + '.</b> <span>' + escapeHtml(opt.text) + '</span></label>').join('') + '</div>' + multiHint;
  } else {
    body = '<div class="options">' + q.options.map(opt => '<label class="option"><input type="radio" name="' + q.id + '" value="' + escapeHtml(opt.key) + '" ' + (answer===opt.key?'checked':'') + '> <b>' + escapeHtml(opt.key) + '.</b> <span>' + escapeHtml(opt.text) + '</span></label>').join('') + '</div>';
  }
  const typeBadge = q.type === 'text' ? '主观题' : isMulti(q) ? '多选题' : isJudge(q) ? '判断题' : '单选题';
  const qTitleContent = (q.type === 'text' && typeof marked !== 'undefined') ? marked.parse(q.question.replace(/\\/g, '\\\\')) : escapeHtml(q.question);
  const titleClass = q.type === 'text' ? 'q-title markdown-body' : 'q-title';
  return '<article class="question-card ' + statusClass + '" data-id="' + q.id + '"><div class="q-head"><div class="badge">' + escapeHtml(q.section) + ' · 第 ' + q.number + ' 题</div><div class="badge">' + typeBadge + '</div></div><div class="' + titleClass + '">' + qTitleContent + '</div>' + body + objectiveResult + textResult + '</article>';
}

function filteredQuestions() {
  const section = $('sectionFilter').value || '全部';
  return QUESTIONS.filter(q => {
    if (section !== '全部' && q.section !== section) return false;
    if (state.wrongOnly && !isWrong(q)) return false;
    return true;
  });
}

function render() {
  renderFilters();
  const list = filteredQuestions();
  $('questionList').innerHTML = list.length ? list.map(renderQuestion).join('') : '<div class="empty">当前筛选条件下没有题目。</div>';
  bindInputs();
  updateStats();
}

function bindInputs() {
  document.querySelectorAll('textarea[data-text]').forEach(input => input.oninput = e => { state.answers[e.target.dataset.text] = e.target.value; updateStats(); });
  document.querySelectorAll('button[data-self]').forEach(btn => btn.onclick = () => { if (!state.selfMarks) state.selfMarks = {}; state.selfMarks[btn.dataset.id] = btn.dataset.self; render(); });
  document.querySelectorAll('input[type="radio"]').forEach(input => input.onchange = e => {
    state.answers[e.target.name] = e.target.value;
    updateStats();
  });
  document.querySelectorAll('input[type="checkbox"][data-multi]').forEach(input => input.onchange = e => {
    const qid = e.target.dataset.multi;
    if (!state.answers[qid]) state.answers[qid] = [];
    if (!Array.isArray(state.answers[qid])) state.answers[qid] = [];
    const val = e.target.value;
    if (e.target.checked) {
      if (!state.answers[qid].includes(val)) state.answers[qid].push(val);
    } else {
      state.answers[qid] = state.answers[qid].filter(v => v !== val);
    }
    updateStats();
  });
}

function updateStats() {
  $('totalCount').textContent = QUESTIONS.length;
  $('answeredCount').textContent = QUESTIONS.filter(isAnswered).length;
  $('correctCount').textContent = QUESTIONS.filter(q => state.submitted && isCorrect(q)).length;
  $('wrongCount').textContent = QUESTIONS.filter(isWrong).length;
}

function exportWrong() {
  const wrong = QUESTIONS.filter(isWrong);
  if (!wrong.length) { alert('当前没有错题可导出。'); return; }
  const nl = String.fromCharCode(10);
  const br = '<br>';
  const rows = wrong.map(q => {
    const yourAnswer = isMulti(q) ? getMultiDisplay(q) : (state.answers[q.id] || '未作答');
    const typeStr = q.type === 'text' ? '主观题' : isMulti(q) ? '多选' : isJudge(q) ? '判断' : '单选';
    return '<section><h2>' + escapeHtml(q.section) + ' 第 ' + q.number + ' 题（' + typeStr + '）</h2><p>' + escapeHtml(q.question).split(nl).join(br) + '</p><p><b>你的答案：</b>' + escapeHtml(yourAnswer || '未作答').split(nl).join(br) + '</p><p><b>正确答案：</b>' + escapeHtml(q.answer).split(nl).join(br) + '</p>' + (q.type !== 'text' ? '<p><b>解析：</b>' + escapeHtml(q.analysis).split(nl).join(br) : '') + '</p></section>';
  }).join(nl);
  const doc = '<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><title>软项目管错题导出</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;line-height:1.7;max-width:920px;margin:30px auto;padding:0 18px}section{border:1px solid #ddd;border-radius:12px;padding:16px;margin:14px 0}h1{color:#1d4ed8}</style></head><body><h1>软项目管错题导出</h1><p>共 ' + wrong.length + ' 道错题，导出时间：' + new Date().toLocaleString() + '</p>' + rows + '</body></html>';
  const blob = new Blob([doc], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '软项目管错题导出.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

$('submitBtn').onclick = () => { state.submitted = true; state.wrongOnly = false; $('wrongOnlyBtn').textContent = '只看错题'; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
$('wrongOnlyBtn').onclick = () => { state.wrongOnly = !state.wrongOnly; $('wrongOnlyBtn').textContent = state.wrongOnly ? '查看全部' : '只看错题'; render(); };
$('exportBtn').onclick = exportWrong;
$('resetBtn').onclick = () => { if (!confirm('确定要清空所有作答记录吗？')) return; state.answers = {}; state.submitted = false; state.wrongOnly = false; state.selfMarks = {}; $('wrongOnlyBtn').textContent = '只看错题'; render(); };
$('sectionFilter').onchange = render;

let immQuestions = [];
let immSubmittedIds = new Set(); 

// Check if multi type
function _isMType(q) {
  return q.type === 'multiple' || q.type === 'multi';
}

const enterBtn = document.createElement('button');
enterBtn.textContent = '沉浸模式';
enterBtn.style.fontWeight = 'bold';
enterBtn.style.color = 'var(--primary)';
enterBtn.style.borderColor = 'var(--primary)';
enterBtn.onclick = () => {
  isImmersive = true;
  document.body.classList.add('immersive-mode');
  immQuestions = filteredQuestions();
  immIndex = 0;
  renderImmersive();
};
document.querySelector('.toolbar').insertBefore(enterBtn, document.querySelector('.toolbar').firstChild);

$('immExitBtn').onclick = () => {
  isImmersive = false;
  document.body.classList.remove('immersive-mode');
  render();
};

$('immSubmitAllBtn').onclick = () => {
  if(confirm('确认全部提交（交卷）吗？')) {
    state.submitted = true;
    renderImmersive();
    updateStats();
  }
};

$('immCloseSidebarBtn').onclick = () => {
  $('immersiveSidebar').classList.add('collapsed');
  $('immOpenSidebarBtn').classList.remove('hidden');
};
$('immOpenSidebarBtn').onclick = () => {
  $('immersiveSidebar').classList.remove('collapsed');
  $('immOpenSidebarBtn').classList.add('hidden');
};

function renderImmersiveGrid() {
  const originalSub = state.submitted;
  $('immersiveGrid').innerHTML = immQuestions.map((q, i) => {
    state.submitted = originalSub || immSubmittedIds.has(q.id);
    let cls = '';
    if (state.submitted || q.type === 'text') {
      if (isCorrect(q)) cls = 'correct';
      else if (isWrong(q)) cls = 'wrong';
      else if (isAnswered(q)) cls = 'answered';
    } else {
      if (isAnswered(q)) cls = 'answered';
    }
    if (i === immIndex) cls += ' active';
    return `<button class="${cls}" data-imm-idx="${i}">${i + 1}</button>`;
  }).join('');
  state.submitted = originalSub;

  document.querySelectorAll('#immersiveGrid button').forEach(btn => {
    btn.onclick = () => { immIndex = parseInt(btn.dataset.immIdx); renderImmersive(); };
  });
  
  const activeBtn = document.querySelector('#immersiveGrid button.active');
  if (activeBtn) activeBtn.scrollIntoView({ block: 'nearest' });
}

function renderImmersive() {
  if (!immQuestions.length) {
    $('immersiveQuestionArea').innerHTML = '<div class="empty">当前没有题目可刷</div>';
    return;
  }
  if (immIndex >= immQuestions.length) immIndex = immQuestions.length - 1;
  if (immIndex < 0) immIndex = 0;
  
  const q = immQuestions[immIndex];
  
  const originalSub = state.submitted;
  state.submitted = originalSub || immSubmittedIds.has(q.id);
  
  let qHtml = '';
  if (_isMType(q)) {
    const statusClass = state.submitted ? (isCorrect(q) ? 'correct' : isWrong(q) ? 'wrong' : '') : '';
    const answer = state.answers[q.id] || [];
    const ansArray = Array.isArray(answer) ? answer : [answer].filter(Boolean);
    const resultVisible = state.submitted ? 'show' : '';
    const objectiveResult = state.submitted ? `<div class="result ${resultVisible}"><div class="${isCorrect(q) ? 'ok' : 'bad'}">${isCorrect(q) ? '回答正确' : ansArray.length ? '回答错误' : '未作答'}</div><div>你的答案：${escapeHtml(ansArray.join(',') || '未作答')}；正确答案：${escapeHtml(q.answer)}</div><div class="analysis">解析：${escapeHtml(q.analysis)}</div></div>` : '';
    
    const body = `<div class="options">${q.options.map(opt => `<label class="option"><input type="checkbox" name="${q.id}" value="${escapeHtml(opt.key)}" ${ansArray.includes(opt.key)?'checked':''}> <b>${escapeHtml(opt.key)}.</b> <span>${escapeHtml(opt.text)}</span></label>`).join('')}</div>`;
    
    qHtml = `<article class="question-card ${statusClass}" data-id="${q.id}"><div class="q-head"><div class="badge">${escapeHtml(q.section)} · 第 ${q.number} 题</div><div class="badge">多选题</div></div><div class="q-title">${escapeHtml(q.question)}</div>${body}${objectiveResult}</article>`;
  } else {
    qHtml = renderQuestion(q);
  }
  
  state.submitted = originalSub;
  
  $('immersiveQuestionArea').innerHTML = qHtml;
  
  document.querySelectorAll('#immersiveQuestionArea input[type="radio"]').forEach(input => input.onchange = e => { state.answers[e.target.name] = e.target.value; renderImmersiveGrid(); updateStats(); });
  document.querySelectorAll('#immersiveQuestionArea input[type="checkbox"]').forEach(input => input.onchange = e => { 
    const qid = e.target.name;
    let arr = state.answers[qid] || [];
    if (!Array.isArray(arr)) arr = [arr].filter(Boolean);
    if (e.target.checked) { if (!arr.includes(e.target.value)) arr.push(e.target.value); }
    else { arr = arr.filter(v => v !== e.target.value); }
    arr.sort();
    state.answers[qid] = arr;
    renderImmersiveGrid(); updateStats();
  });
  document.querySelectorAll('#immersiveQuestionArea textarea[data-text]').forEach(input => input.oninput = e => { state.answers[e.target.dataset.text] = e.target.value; renderImmersiveGrid(); updateStats(); });
  document.querySelectorAll('#immersiveQuestionArea button[data-self]').forEach(btn => btn.onclick = () => { state.selfMarks[btn.dataset.id] = btn.dataset.self; renderImmersive(); updateStats(); });
  
  $('immPrevBtn').disabled = immIndex === 0;
  $('immNextBtn').disabled = immIndex === immQuestions.length - 1;
  renderImmersiveGrid();
} 
  if (typeof typesetMath === 'function') typesetMath();

$('immPrevBtn').onclick = () => { if(immIndex > 0) { immIndex--; renderImmersive(); } };
$('immNextBtn').onclick = () => { if(immIndex < immQuestions.length - 1) { immIndex++; renderImmersive(); } };

const originalRenderQuestion = renderQuestion;
renderQuestion = (q) => {
  if (_isMType(q)) {
    const statusClass = state.submitted ? (isCorrect(q) ? 'correct' : isWrong(q) ? 'wrong' : '') : '';
    const answer = state.answers[q.id] || [];
    const ansArray = Array.isArray(answer) ? answer : [answer].filter(Boolean);
    const resultVisible = state.submitted ? 'show' : '';
    const objectiveResult = state.submitted ? `<div class="result ${resultVisible}"><div class="${isCorrect(q) ? 'ok' : 'bad'}">${isCorrect(q) ? '回答正确' : ansArray.length ? '回答错误' : '未作答'}</div><div>你的答案：${escapeHtml(ansArray.join(',') || '未作答')}；正确答案：${escapeHtml(q.answer)}</div><div class="analysis">解析：${escapeHtml(q.analysis)}</div></div>` : '';
    
    const body = `<div class="options">${q.options.map(opt => `<label class="option"><input type="checkbox" name="${q.id}" value="${escapeHtml(opt.key)}" ${ansArray.includes(opt.key)?'checked':''}> <b>${escapeHtml(opt.key)}.</b> <span>${escapeHtml(opt.text)}</span></label>`).join('')}</div>`;
    return `<article class="question-card ${statusClass}" data-id="${q.id}"><div class="q-head"><div class="badge">${escapeHtml(q.section)} · 第 ${q.number} 题</div><div class="badge">多选题</div></div><div class="q-title">${escapeHtml(q.question)}</div>${body}${objectiveResult}</article>`;
  }
  return originalRenderQuestion(q);
};

const originalBindInputs = bindInputs;
bindInputs = () => {
  originalBindInputs();
  document.querySelectorAll('input[type="checkbox"]').forEach(input => input.onchange = e => { 
    const qid = e.target.name;
    let arr = state.answers[qid] || [];
    if (!Array.isArray(arr)) arr = [arr].filter(Boolean);
    if (e.target.checked) { if (!arr.includes(e.target.value)) arr.push(e.target.value); }
    else { arr = arr.filter(v => v !== e.target.value); }
    arr.sort();
    state.answers[qid] = arr;
    updateStats(); 
  });
};

const originalIsCorrect = isCorrect;
isCorrect = (q) => {
  if (_isMType(q)) {
    const ansArray = state.answers[q.id] || [];
    const ansStr = Array.isArray(ansArray) ? ansArray.sort().join('') : (ansArray || '');
    return ansStr === q.answer;
  }
  return originalIsCorrect(q);
};

const originalIsWrong = isWrong;
isWrong = (q) => {
  if (_isMType(q)) {
    const ansArray = state.answers[q.id] || [];
    return state.submitted && ansArray.length > 0 && !isCorrect(q);
  }
  return originalIsWrong(q);
};

// Keyboard bindings
window.addEventListener('keydown', e => {
  if (!isImmersive) return;
  const tagName = e.target.tagName.toLowerCase();
  if (tagName === 'input' || tagName === 'textarea') return;
  
  if (!immQuestions.length) return;
  const q = immQuestions[immIndex];
  
  if (e.key === 'ArrowLeft') {
    if (immIndex > 0) { immIndex--; renderImmersive(); }
    e.preventDefault();
  } else if (e.key === 'ArrowRight') {
    if (immIndex < immQuestions.length - 1) { immIndex++; renderImmersive(); }
    e.preventDefault();
  } else if (e.key === 'Enter') {
    immSubmittedIds.add(q.id);
    renderImmersive();
    updateStats();
    e.preventDefault();
  } else {
    // Check index via keys: 1,2,3,4, a,b,c,d, t,f
    const keyMap = { '1': 0, 'a': 0, '2': 1, 'b': 1, '3': 2, 'c': 2, '4': 3, 'd': 3, 't': 0, 'f': 1 };
    const k = e.key.toLowerCase();
    
    if (keyMap[k] !== undefined && q.type !== 'text') {
      const idx = keyMap[k];
      let mappedKey = null;
      
      if (q.type === 'judge') {
        if (q.options && q.options.length > idx) {
           mappedKey = q.options[idx].key;
        } else if (idx === 0) {
           mappedKey = (q.answer === '√' || q.answer === '×') ? '√' : '正确';
        } else if (idx === 1) {
           mappedKey = (q.answer === '√' || q.answer === '×') ? '×' : '错误';
        }
      } else if (q.options && q.options.length > idx) {
        mappedKey = q.options[idx].key;
      }
      
      if (mappedKey !== null) {
        if (_isMType(q)) {
          let arr = state.answers[q.id] || [];
          if (!Array.isArray(arr)) arr = [arr].filter(Boolean);
          if (arr.includes(mappedKey)) {
            arr = arr.filter(v => v !== mappedKey);
          } else {
            arr.push(mappedKey);
          }
          arr.sort();
          state.answers[q.id] = arr;
        } else {
          state.answers[q.id] = mappedKey;
        }
        renderImmersive();
        updateStats();
        e.preventDefault();
      }
    }
  }
});

const bgmAudio = document.getElementById('bgmAudio');
const bgmToggleBtn = document.getElementById('bgmToggleBtn');
if (bgmToggleBtn && bgmAudio) {
  bgmToggleBtn.addEventListener('click', () => {
    if (bgmAudio.paused) {
      bgmAudio.play();
      bgmToggleBtn.classList.add('playing');
    } else {
      bgmAudio.pause();
      bgmToggleBtn.classList.remove('playing');
    }
  });
}

function typesetMath() {
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise().catch(function(err) { console.log(err.message); });
  } else {
    setTimeout(typesetMath, 500);
  }
}
